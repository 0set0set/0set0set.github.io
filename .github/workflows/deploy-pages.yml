name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install just
        run: sudo apt-get update && sudo apt-get install -y just

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: web/.nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Resolve Pages paths
        id: pages
        shell: bash
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"
          site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io"

          if [[ "$repository_name" == *.github.io ]]; then
            base_path="/"
          else
            base_path="/${repository_name}"
          fi

          echo "site_url=${site_url}" >> "$GITHUB_OUTPUT"
          echo "base_path=${base_path}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: just setup

      - name: Check site
        run: just check

      - name: Build site
        run: just build
        env:
          SITE_URL: ${{ steps.pages.outputs.site_url }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: web/dist

  deploy:
    name: Deploy site
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
